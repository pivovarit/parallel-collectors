<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Backgrounds -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080e1a"/>
      <stop offset="100%" stop-color="#040810"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="72%">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.5"/>
    </radialGradient>
    <!-- Atmospheric glows -->
    <radialGradient id="atm-blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="atm-amber" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="atm-cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <!-- Box fills -->
    <linearGradient id="box-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4f91f7"/>
      <stop offset="100%" stop-color="#1a40c4"/>
    </linearGradient>
    <linearGradient id="box-orange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="box-cyan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0e6e8a"/>
    </linearGradient>
    <!-- Gloss shine: applied on top of each box -->
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="55%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <!-- Filters -->
    <filter id="glow-blue" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-orange" x="-20%" y="-35%" width="140%" height="170%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-cyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Arrowhead -->
    <marker id="arr" viewBox="0 0 10 10" refX="10" refY="5"
            markerUnits="userSpaceOnUse" markerWidth="11" markerHeight="9" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="rgba(255,255,255,0.88)"/>
    </marker>
  </defs>

  <!-- ── Background ── -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Atmospheric glow spots (centred behind each diagram section) -->
  <rect x="20" y="190" width="500" height="290" fill="url(#atm-blue)" rx="250"/>
  <rect x="560" y="200" width="380" height="270" fill="url(#atm-amber)" rx="190"/>
  <rect x="880" y="215" width="300" height="240" fill="url(#atm-cyan)" rx="150"/>
  <!-- Vignette -->
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- ── Title ── -->
  <text
    x="600" y="144"
    font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
    font-size="88" font-weight="700" fill="#ffffff"
    text-anchor="middle" letter-spacing="-2.5"
  >Parallel Collectors</text>

  <!-- ── Subtitle ── -->
  <text x="600" y="192"
    font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
    font-size="24" fill="#7a93b0" text-anchor="middle" letter-spacing="0.2"
  >Supercharge your Stream pipeline with</text>
  <text x="600" y="220"
    font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
    font-size="24" fill="#60a5fa" font-style="italic" font-weight="500" text-anchor="middle"
  >parallelized Collectors.</text>

  <!-- ── Diagram ──
    Blue boxes:   70×70, gap=60, centered at y=350 → y=315
      B1 x=138  B2 x=268  B3 x=398  B4 x=528, right=598
    Orange boxes: 210×40, gap=22, centers: y=288/350/412 → y=268/330/392
      x=666, right=876
    Result box:   82×72, y=314, x=974, right=1056, center=(1015,350)
    Diagram center = (138+1056)/2 = 597 ≈ 600 ✓
  -->

  <!-- Blue sequential boxes -->
  <rect x="138" y="315" width="70" height="70" rx="10" fill="url(#box-blue)" stroke="rgba(255,255,255,0.14)" stroke-width="1" filter="url(#glow-blue)"/>
  <rect x="138" y="315" width="70" height="70" rx="10" fill="url(#shine)"/>

  <rect x="268" y="315" width="70" height="70" rx="10" fill="url(#box-blue)" stroke="rgba(255,255,255,0.14)" stroke-width="1" filter="url(#glow-blue)"/>
  <rect x="268" y="315" width="70" height="70" rx="10" fill="url(#shine)"/>

  <rect x="398" y="315" width="70" height="70" rx="10" fill="url(#box-blue)" stroke="rgba(255,255,255,0.14)" stroke-width="1" filter="url(#glow-blue)"/>
  <rect x="398" y="315" width="70" height="70" rx="10" fill="url(#shine)"/>

  <rect x="528" y="315" width="70" height="70" rx="10" fill="url(#box-blue)" stroke="rgba(255,255,255,0.14)" stroke-width="1" filter="url(#glow-blue)"/>
  <rect x="528" y="315" width="70" height="70" rx="10" fill="url(#shine)"/>

  <!-- Sequential arrows (y=350) — no filter; drawn last so they sit on top of box glows -->
  <line x1="212" y1="350" x2="265" y2="350" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="342" y1="350" x2="395" y2="350" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="472" y1="350" x2="525" y2="350" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Fan-out arrows: 3 distinct origins on box4's right edge → each orange box left-center -->
  <path d="M 598,330 C 636,330 636,288 663,288"
        fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="598" y1="350" x2="663" y2="350"
        stroke="rgba(255,255,255,0.9)" stroke-width="2.5" marker-end="url(#arr)"/>
  <path d="M 598,370 C 636,370 636,412 663,412"
        fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Orange parallel boxes -->
  <rect x="666" y="268" width="210" height="40" rx="8" fill="url(#box-orange)" stroke="rgba(255,255,255,0.14)" stroke-width="1" filter="url(#glow-orange)"/>
  <rect x="666" y="268" width="210" height="40" rx="8" fill="url(#shine)"/>

  <rect x="666" y="330" width="210" height="40" rx="8" fill="url(#box-orange)" stroke="rgba(255,255,255,0.14)" stroke-width="1" filter="url(#glow-orange)"/>
  <rect x="666" y="330" width="210" height="40" rx="8" fill="url(#shine)"/>

  <rect x="666" y="392" width="210" height="40" rx="8" fill="url(#box-orange)" stroke="rgba(255,255,255,0.14)" stroke-width="1" filter="url(#glow-orange)"/>
  <rect x="666" y="392" width="210" height="40" rx="8" fill="url(#shine)"/>

  <!-- Convergence arrows: each orange right-center → 3 distinct endpoints on result box left edge -->
  <path d="M 876,288 C 930,288 930,330 971,330"
        fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="876" y1="350" x2="971" y2="350"
        stroke="rgba(255,255,255,0.9)" stroke-width="2.5" marker-end="url(#arr)"/>
  <path d="M 876,412 C 930,412 930,370 971,370"
        fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Result box (cyan) -->
  <rect x="974" y="314" width="82" height="72" rx="10" fill="url(#box-cyan)" stroke="rgba(255,255,255,0.18)" stroke-width="1" filter="url(#glow-cyan)"/>
  <rect x="974" y="314" width="82" height="72" rx="10" fill="url(#shine)"/>
  <!-- List icon: 3 short white lines suggesting a collected result -->
  <line x1="990" y1="336" x2="1040" y2="336" stroke="rgba(255,255,255,0.75)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="990" y1="350" x2="1040" y2="350" stroke="rgba(255,255,255,0.75)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="990" y1="364" x2="1040" y2="364" stroke="rgba(255,255,255,0.75)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- ── Tagline ── -->
  <text
    x="600" y="502"
    font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
    font-size="22" fill="#4a637a" text-anchor="middle" letter-spacing="4"
  >NON-INTRUSIVE  ·  PERFORMANT  ·  ELEGANT</text>

  <!-- ── Domain ── -->
  <text
    x="600" y="572"
    font-family="'Courier New',monospace"
    font-size="14" fill="#243044" text-anchor="middle" letter-spacing="1"
  >pcollectors.pivovarit.com</text>
</svg>
